<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="content.css">
</head>
<body>
  <div id="overlay" class="visible">
    <header>
      <span class="last-updated-wrap">
        <span id="last-updated" class="last-updated"></span>
        <span id="refresh-link" class="refresh-link">refresh</span>
      </span>
      <label id="hide-nav-toggle" class="hide-nav-toggle" title="Hide Slack sidebar">
        <input type="checkbox" id="hide-nav-checkbox"> hide nav
      </label>
    </header>
    <div id="body">
      <div id="status">Connecting...</div>
    </div>
  </div>
  <div id="lightbox">
    <div class="lb-backdrop"></div>
    <button class="lb-close">&times;</button>
    <div class="lb-counter"></div>
    <button class="lb-arrow prev">&#8249;</button>
    <button class="lb-arrow next">&#8250;</button>
    <div class="lb-media"></div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
