<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="content.css">
</head>
<body>
  <div id="overlay" class="visible">
    <header>
      <span class="last-updated-wrap">
        <span id="last-updated" class="last-updated"></span>
        <span id="refresh-link" class="refresh-link">refresh now</span>
      </span>
      <button id="help-btn" class="help-btn" title="Show tips" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><text x="8" y="11.5" text-anchor="middle" fill="currentColor" font-size="10" font-family="system-ui" font-weight="600">?</text></svg>
      </button>
      <button id="settings-btn" class="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.7 1h2.6l.4 1.8.6.3 1.7-.8 1.8 1.8-.8 1.7.3.6 1.8.4v2.6l-1.8.4-.3.6.8 1.7-1.8 1.8-1.7-.8-.6.3-.4 1.8H6.7l-.4-1.8-.6-.3-1.7.8-1.8-1.8.8-1.7-.3-.6L1 9.3V6.7l1.8-.4.3-.6-.8-1.7L4.1 2.2l1.7.8.6-.3L6.7 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </header>
    <div id="body">
      <div id="status">Connecting...</div>
    </div>
  </div>
  <div id="lightbox">
    <div class="lb-backdrop"></div>
    <button class="lb-close">&times;</button>
    <div class="lb-counter"></div>
    <button class="lb-arrow prev">&#8249;</button>
    <button class="lb-arrow next">&#8250;</button>
    <div class="lb-media"></div>
  </div>
  <div id="demo-bar">
    <label id="demo-label" title="Demo mode"><input type="checkbox" id="demo-checkbox"> demo</label>
    <button id="snapshot-export" class="snapshot-btn" title="Download cached data">&#x2913;</button>
    <button id="snapshot-import" class="snapshot-btn" title="Upload cached data (re-open extension to show)">&#x2912;</button>
    <label id="assess-label" title="Assessment mode — show disagree buttons on items"><input type="checkbox" id="assess-checkbox">&#x1F9EA;</label>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
