<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="content.css">
</head>
<body>
  <div id="overlay" class="visible">
    <header>
      <span class="last-updated-wrap">
        <span id="last-updated" class="last-updated"></span>
        <span id="refresh-link" class="refresh-link">refresh now</span>
      </span>
      <button id="help-btn" class="help-btn" title="Show tips">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M15 8A7 7 0 1 1 1 8a7 7 0 0 1 14 0Zm-6 3.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM7.293 5.293a1 1 0 1 1 .99 1.667c-.459.134-1.033.566-1.033 1.29v.25a.75.75 0 1 0 1.5 0v-.115a2.5 2.5 0 1 0-2.518-4.153.75.75 0 1 0 1.061 1.06Z" clip-rule="evenodd"/></svg>
      </button>
      <button id="settings-btn" class="settings-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M6.455 1.45A.5.5 0 0 1 6.952 1h2.096a.5.5 0 0 1 .497.45l.186 1.858a4.996 4.996 0 0 1 1.466.848l1.703-.769a.5.5 0 0 1 .639.206l1.047 1.814a.5.5 0 0 1-.14.656l-1.517 1.09a5.026 5.026 0 0 1 0 1.694l1.516 1.09a.5.5 0 0 1 .141.656l-1.047 1.814a.5.5 0 0 1-.639.206l-1.703-.768c-.433.36-.928.649-1.466.847l-.186 1.858a.5.5 0 0 1-.497.45H6.952a.5.5 0 0 1-.497-.45l-.186-1.858a4.993 4.993 0 0 1-1.466-.848l-1.703.769a.5.5 0 0 1-.639-.206l-1.047-1.814a.5.5 0 0 1 .14-.656l1.517-1.09a5.033 5.033 0 0 1 0-1.694l-1.516-1.09a.5.5 0 0 1-.141-.656L2.46 3.593a.5.5 0 0 1 .639-.206l1.703.769c.433-.36.928-.65 1.466-.848l.186-1.858Zm-.177 7.567-.022-.037a2 2 0 0 1 3.466-1.997l.022.037a2 2 0 0 1-3.466 1.997Z" clip-rule="evenodd"/></svg>
      </button>
    </header>
    <div id="body">
      <div id="status">Connecting...</div>
    </div>
  </div>
  <div id="lightbox">
    <div class="lb-backdrop"></div>
    <button class="lb-close">&times;</button>
    <div class="lb-counter"></div>
    <button class="lb-arrow prev">&#8249;</button>
    <button class="lb-arrow next">&#8250;</button>
    <div class="lb-media"></div>
  </div>
  <!-- DEV_ONLY_START -->
  <div id="demo-bar">
    <span class="demo-group"><label id="demo-label" title="Demo mode"><input type="checkbox" id="demo-checkbox"> demo</label>
    <button id="snapshot-export" class="snapshot-btn" title="Download cached data">↓</button>
    <button id="snapshot-import" class="snapshot-btn" title="Upload cached data (re-open extension to show)">↑</button></span>
    <span class="demo-group"><label id="assess-label" title="Assessment mode — show disagree buttons on items"><input type="checkbox" id="assess-checkbox">&#x1F9EA;</label>
    <button id="eval-export" class="snapshot-btn" title="Download eval data (Shift+E)">↓</button></span>
    <button id="nuke-cache" class="snapshot-btn" title="Clear all AI caches and re-analyze">&#x1F5D1;</button>
  </div>
  <!-- DEV_ONLY_END -->
  <script src="prioritization.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
