<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Slack Attention Firewall — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Slack Attention Firewall</h1>
    <p class="subtitle">Settings</p>

    <section>
      <h2>About Me</h2>
      <p class="hint">Brief context about your role — included in AI prompts so summaries are tailored to you. <span id="char-count" class="char-count">0/400</span></p>
      <textarea id="user-context" maxlength="400" rows="3" placeholder="e.g. Head of Product Management & Insights. I care most about launch readiness, cross-team dependencies, and customer escalations."></textarea>
    </section>

    <section>
      <h2>Claude API Key</h2>
      <p class="hint">Your Anthropic API key for smart prioritization. Stored locally in your browser.</p>
      <div class="field">
        <input id="api-key" type="password" placeholder="sk-ant-..." spellcheck="false" autocomplete="off">
        <button id="toggle-key" class="icon-btn" title="Show/hide key">eye</button>
      </div>
    </section>

    <div class="actions">
      <button id="save-btn">Save</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
