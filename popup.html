<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      max-height: 500px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1d1c1d;
      background: #fff;
    }
    header {
      padding: 12px 16px;
      background: #4a154b;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    #fetch-btn {
      background: #fff;
      color: #4a154b;
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    #fetch-btn:hover { background: #e8d5e8; }
    #fetch-btn:disabled { opacity: 0.5; cursor: wait; }
    .badges {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      background: #f8f8f8;
      border-bottom: 1px solid #e8e8e8;
      font-size: 12px;
      color: #616061;
    }
    .badge { display: flex; align-items: center; gap: 4px; }
    .badge .count {
      background: #e01e5a;
      color: #fff;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge .count.zero { background: #ccc; }
    section { padding: 8px 0; }
    section h2 {
      padding: 4px 16px 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #616061;
      letter-spacing: 0.5px;
    }
    .item {
      padding: 8px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: default;
    }
    .item:hover { background: #f8f8f8; }
    .item-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .item-channel {
      font-size: 11px;
      color: #616061;
      font-weight: 600;
    }
    .item-time {
      font-size: 11px;
      color: #999;
    }
    .item-user { font-weight: 600; }
    .item-text {
      color: #1d1c1d;
      line-height: 1.4;
      word-break: break-word;
    }
    .item-mention {
      font-size: 11px;
      font-weight: 700;
      color: #e01e5a;
      margin-bottom: 3px;
    }
    .item-reply-count {
      margin-top: 4px;
      font-size: 11px;
      color: #1264a3;
      font-weight: 600;
    }
    .item-reply {
      margin-top: 4px;
      padding-left: 12px;
      border-left: 2px solid #e8e8e8;
      color: #616061;
    }
    #status {
      padding: 24px 16px;
      text-align: center;
      color: #999;
    }
    .error { color: #e01e5a; }
  </style>
</head>
<body>
  <header>
    <h1>FSlack</h1>
    <button id="fetch-btn">Fetch Unreads</button>
  </header>
  <div id="content">
    <div id="status">Click "Fetch Unreads" to scan Slack.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
